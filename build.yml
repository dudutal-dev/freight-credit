name: Build Standalone

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build standalone HTML
        run: node scripts/build-standalone.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: freight-credit-standalone
          path: dist/freight-credit.html
          retention-days: 30

      - name: Commit dist files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: rebuild standalone HTML [skip ci]"
          git push
